<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mastersbet 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #2d3748;
      --bg-darker: #1a202c;
      --bg-card: #374151;
      --bg-input: #4a5568;
      --green: #48bb78;
      --green-light: #68d391;
      --green-dark: #38a169;
      --white: #f7fafc;
      --gray-light: #cbd5e0;
      --gray: #a0aec0;
      --text: #f7fafc;
      --text-muted: #a0aec0;
      --border: #4a5568;
      --red: #fc8181;
      --red-dark: #e53e3e;
      --correct: #68d391;
      --wrong: #fc8181;
      --gold: #ecc94b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-dark); color: var(--text); min-height: 100vh;
    }

    /* ── Landing page ── */
    .landing {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #F0F0F0;
      padding: 2rem;
    }
    .landing-logo {
      width: min(500px, 85vw); margin-bottom: 3rem;
      border-radius: 16px;
      display: block;
    }
    .landing-buttons {
      display: flex; flex-direction: column; gap: 1rem; width: min(320px, 90vw);
    }
    .landing-btn {
      display: block; width: 100%; padding: 1rem; border-radius: 8px;
      font-family: inherit; font-size: 1rem; font-weight: 600;
      cursor: pointer; text-align: center; transition: all 0.2s;
      border: 2px solid transparent; letter-spacing: 0.5px;
    }
    .landing-btn-primary {
      background: #085036; color: white; border-color: #085036;
    }
    .landing-btn-primary:hover { background: #0a6b47; border-color: #0a6b47; }
    .landing-btn-secondary {
      background: transparent; color: #085036; border-color: #085036;
    }
    .landing-btn-secondary:hover { background: #085036; color: white; }
    .landing-btn-admin {
      background: transparent; color: #666; border: none;
      font-size: 0.85rem; margin-top: 0.5rem;
    }
    .landing-btn-admin:hover { color: #085036; }

    /* ── Header ── */
    .header {
      background: var(--bg-darker); padding: 0.8rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .header-logo { height: 44px; width: auto; display: block; border-radius: 6px; }
    .header nav { display: flex; gap: 0.3rem; align-items: center; flex-wrap: wrap; }
    .header nav button {
      background: transparent; border: 1px solid transparent;
      color: var(--gray-light); padding: 0.4rem 0.9rem; border-radius: 6px; cursor: pointer;
      font-family: inherit; font-size: 0.85rem; font-weight: 500; transition: all 0.15s;
    }
    .header nav button:hover { color: var(--white); background: var(--bg-card); }
    .header nav button.active { color: var(--green); border-color: var(--green); background: rgba(72,187,120,0.1); }
    .user-info {
      font-size: 0.85rem; color: var(--green-light); margin-right: 0.5rem; font-weight: 500;
    }

    /* ── Main ── */
    .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    .card {
      background: var(--bg-card); border-radius: 10px; padding: 2rem;
      border: 1px solid var(--border); margin-bottom: 1.5rem;
    }
    h2 { color: var(--green-light); margin-bottom: 1rem; font-size: 1.2rem; font-weight: 600; }
    h3 { color: var(--green-light); margin-bottom: 0.5rem; font-weight: 600; }

    /* ── Auth Form ── */
    .auth-container {
      max-width: 420px; margin: 0 auto;
    }
    .auth-header {
      text-align: center; margin-bottom: 2rem;
    }
    .auth-header img { height: 40px; margin-bottom: 1rem; }
    .auth-back {
      background: none; border: none; color: var(--gray); cursor: pointer;
      font-family: inherit; font-size: 0.85rem; display: flex; align-items: center; gap: 0.3rem;
      margin-bottom: 1.5rem;
    }
    .auth-back:hover { color: var(--green); }

    /* ── Forms ── */
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.3rem; font-weight: 500; font-size: 0.85rem; color: var(--gray-light); }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.7rem 0.9rem; border: 1px solid var(--border); border-radius: 6px;
      font-family: inherit; font-size: 0.95rem; background: var(--bg-input); color: var(--text);
      transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: var(--green);
    }
    .form-group input::placeholder { color: var(--gray); }

    .btn {
      background: var(--green); color: var(--bg-darker); border: none; padding: 0.7rem 1.5rem;
      border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 0.95rem;
      font-weight: 600; transition: all 0.15s;
    }
    .btn:hover { background: var(--green-light); }
    .btn-secondary { background: var(--bg-input); color: var(--text); }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger { background: var(--red-dark); color: white; }
    .btn-danger:hover { background: #c53030; }
    .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.8rem; }
    .btn-block { display: block; width: 100%; }

    /* ── Questions ── */
    .question-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
      padding: 1.2rem; margin-bottom: 0.8rem;
    }
    .question-card .q-header {
      display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.8rem;
    }
    .question-card .q-text { font-weight: 600; font-size: 0.95rem; flex: 1; }
    .question-card .q-points {
      background: rgba(72,187,120,0.15); color: var(--green-light); padding: 0.2rem 0.7rem;
      border-radius: 20px; font-size: 0.75rem; font-weight: 600; white-space: nowrap; margin-left: 0.5rem;
    }
    .radio-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .radio-group label {
      display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.7rem;
      border-radius: 6px; cursor: pointer; transition: background 0.15s;
      font-size: 0.9rem;
    }
    .radio-group label:hover { background: rgba(255,255,255,0.05); }
    .radio-group input[type="radio"] { accent-color: var(--green); }

    /* ── Results ── */
    .result-correct { border-left: 4px solid var(--correct); }
    .result-wrong { border-left: 4px solid var(--wrong); }
    .result-pending { border-left: 4px solid var(--gold); }
    .result-badge { font-size: 0.8rem; padding: 0.2rem 0.6rem; border-radius: 4px; font-weight: 600; }
    .badge-correct { background: rgba(104,211,145,0.15); color: var(--correct); }
    .badge-wrong { background: rgba(252,129,129,0.15); color: var(--wrong); }
    .badge-pending { background: rgba(236,201,75,0.15); color: var(--gold); }

    /* ── Leaderboard ── */
    .leaderboard-table { width: 100%; border-collapse: collapse; }
    .leaderboard-table th {
      background: var(--bg-darker); color: var(--gray-light); padding: 0.7rem; text-align: left;
      font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
    }
    .leaderboard-table td { padding: 0.7rem; border-bottom: 1px solid var(--border); }
    .leaderboard-table tr:hover { background: rgba(255,255,255,0.03); }
    .rank-1 { color: var(--gold); font-weight: 700; }
    .rank-2 { color: #c0c0c0; font-weight: 600; }
    .rank-3 { color: #cd7f32; font-weight: 600; }

    /* ── Stats ── */
    .stats-bar { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem 1.5rem; text-align: center; flex: 1; min-width: 120px;
    }
    .stat-card .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--green-light); }
    .stat-card .stat-label { font-size: 0.75rem; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── Banners ── */
    .deadline-banner {
      background: rgba(236,201,75,0.1); border: 1px solid rgba(236,201,75,0.3);
      color: var(--gold); padding: 0.8rem 1.5rem; border-radius: 8px;
      text-align: center; font-weight: 600; margin-bottom: 1.5rem; font-size: 0.9rem;
    }
    .locked-banner {
      background: rgba(229,62,62,0.1); border: 1px solid rgba(229,62,62,0.3);
      color: var(--red); padding: 0.8rem 1.5rem; border-radius: 8px;
      text-align: center; font-weight: 600; margin-bottom: 1.5rem; font-size: 0.9rem;
    }

    /* ── Admin ── */
    .admin-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .admin-table th {
      background: var(--bg-darker); color: var(--gray-light); padding: 0.5rem;
      text-align: left; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .admin-table td { padding: 0.5rem; border-bottom: 1px solid var(--border); }
    .admin-table .actions { display: flex; gap: 0.3rem; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .tab {
      padding: 0.7rem 1.2rem; cursor: pointer; border: none; background: none;
      font-family: inherit; font-size: 0.9rem; color: var(--gray);
      border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; font-weight: 500;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--green-light); border-bottom-color: var(--green); }

    .hidden { display: none !important; }
    .msg { padding: 0.8rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; }
    .msg-error { background: rgba(229,62,62,0.15); color: var(--red); border: 1px solid rgba(229,62,62,0.3); }
    .msg-success { background: rgba(104,211,145,0.15); color: var(--correct); border: 1px solid rgba(104,211,145,0.3); }
    .inline-flex { display: flex; gap: 0.5rem; align-items: center; }

    @media (max-width: 600px) {
      .header { flex-direction: column; gap: 0.5rem; padding: 0.8rem 1rem; }
      .header nav { justify-content: center; }
      .container { padding: 0 0.5rem; }
      .card { padding: 1.2rem; }
      .landing-logo { width: 280px; }
    }
  </style>
</head>

<script>
// ── State ──
let currentUser = null;
let currentView = 'landing';
let isRegister = false;
let myAnswers = {};
let settings = {};

// ── API ──
async function api(url, opts = {}) {
  const res = await fetch(url, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    credentials: 'include'
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Något gick fel');
  return data;
}

// ── Landing ──
function goToLanding() {
  document.getElementById('landingView').classList.remove('hidden');
  document.getElementById('mainHeader').classList.add('hidden');
  document.getElementById('app').classList.add('hidden');
  currentView = 'landing';
}

function goToAuth(mode) {
  document.getElementById('landingView').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  hideAllViews();
  document.getElementById('authView').classList.remove('hidden');
  isRegister = mode === 'register';
  updateAuthUI();
  currentView = 'auth';
}

function updateAuthUI() {
  document.getElementById('authTitle').textContent = isRegister ? 'Skapa konto' : 'Logga in';
  document.getElementById('authBtn').textContent = isRegister ? 'Registrera' : 'Logga in';
  document.getElementById('toggleAuth').textContent = isRegister ? 'Har du redan konto? Logga in' : 'Har du inget konto? Registrera dig';
  document.getElementById('nameGroup').classList.toggle('hidden', !isRegister);
  document.getElementById('authMsg').innerHTML = '';
}

function toggleAuthMode() {
  isRegister = !isRegister;
  updateAuthUI();
}

async function doAuth() {
  const email = document.getElementById('authEmail').value;
  const password = document.getElementById('authPassword').value;
  const name = document.getElementById('authName').value;
  try {
    const endpoint = isRegister ? '/api/auth/register' : '/api/auth/login';
    const body = isRegister ? { name, email, password } : { email, password };
    const data = await api(endpoint, { method: 'POST', body: JSON.stringify(body) });
    currentUser = data.user;
    onLogin();
  } catch (e) {
    document.getElementById('authMsg').innerHTML = `<div class="msg msg-error">${e.message}</div>`;
  }
}

async function checkAuth() {
  try {
    const data = await api('/api/auth/me');
    currentUser = data.user;
    onLogin();
  } catch { /* not logged in – stay on landing */ }
}

async function logout() {
  await api('/api/auth/logout', { method: 'POST' });
  currentUser = null;
  goToLanding();
}

function onLogin() {
  document.getElementById('landingView').classList.add('hidden');
  document.getElementById('mainHeader').classList.remove('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('userInfo').textContent = currentUser.name;
  buildNav();
  loadSettings().then(() => showView('questions'));
}

function buildNav() {
  const nav = document.getElementById('nav');
  let html = `
    <button onclick="showView('questions')">Frågor</button>
    <button onclick="showView('results')">Mina resultat</button>
    <button onclick="showView('leaderboard')">Leaderboard</button>
  `;
  if (currentUser.is_admin) {
    html += `<button onclick="showView('admin')">Admin</button>`;
  }
  html += `<button onclick="logout()">Logga ut</button>`;
  nav.innerHTML = html;
}

// ── Views ──
function hideAllViews() {
  ['authView','questionsView','resultsView','leaderboardView','adminView'].forEach(v =>
    document.getElementById(v).classList.add('hidden'));
}

function showView(name) {
  currentView = name;
  hideAllViews();
  document.getElementById(name + 'View').classList.remove('hidden');

  document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
  const btns = document.querySelectorAll('#nav button');
  const map = { questions: 0, results: 1, leaderboard: 2, admin: 3 };
  if (btns[map[name]]) btns[map[name]].classList.add('active');

  if (name === 'questions') loadQuestions();
  if (name === 'results') loadResults();
  if (name === 'leaderboard') loadLeaderboard();
  if (name === 'admin') { loadAdminQuestions(); loadAdminUsers(); }
}

// ── Settings ──
async function loadSettings() {
  settings = await api('/api/settings');
  document.title = settings.pool_name || 'Mastersbet 2026';
}

// ── Questions ──
async function loadQuestions() {
  const [questions, answersData] = await Promise.all([
    api('/api/questions'),
    api('/api/answers')
  ]);

  myAnswers = {};
  answersData.forEach(a => { myAnswers[a.question_id] = a.answer; });

  const isLocked = settings.locked === '1' || new Date(settings.deadline) < new Date();

  const bannerEl = document.getElementById('deadlineBanner');
  if (isLocked) {
    bannerEl.innerHTML = `<div class="locked-banner">Poolen är låst – inga ändringar kan göras</div>`;
    document.getElementById('saveAnswersBtn').classList.add('hidden');
  } else {
    const dl = new Date(settings.deadline);
    bannerEl.innerHTML = `<div class="deadline-banner">Deadline: ${dl.toLocaleDateString('sv-SE')} kl ${dl.toLocaleTimeString('sv-SE', {hour:'2-digit',minute:'2-digit'})}</div>`;
    document.getElementById('saveAnswersBtn').classList.remove('hidden');
  }

  const answered = questions.filter(q => myAnswers[q.id] !== undefined).length;
  document.getElementById('questionStats').innerHTML = `
    <div class="stat-card"><div class="stat-value">${questions.length}</div><div class="stat-label">Frågor</div></div>
    <div class="stat-card"><div class="stat-value">${answered}</div><div class="stat-label">Besvarade</div></div>
    <div class="stat-card"><div class="stat-value">${questions.reduce((s,q) => s + q.points, 0)}</div><div class="stat-label">Max poäng</div></div>
  `;

  let html = '';
  let lastCategory = null;
  questions.forEach(q => {
    if (q.category && q.category !== lastCategory) {
      html += `<h3 style="margin:1.5rem 0 0.5rem">${q.category}</h3>`;
      lastCategory = q.category;
    }
    html += `<div class="question-card">
      <div class="q-header">
        <span class="q-text">${q.text}</span>
        <span class="q-points">${q.points} p</span>
      </div>
      ${renderInput(q, myAnswers[q.id], isLocked)}
    </div>`;
  });

  document.getElementById('questionsList').innerHTML = html || '<p style="color:var(--text-muted)">Inga frågor har lagts till ännu.</p>';
}

function renderInput(q, answer, disabled) {
  const dis = disabled ? 'disabled' : '';
  switch (q.type) {
    case 'multiple_choice':
      return `<div class="radio-group">${(q.options || []).map(o =>
        `<label><input type="radio" name="q_${q.id}" value="${o}" ${answer === o ? 'checked' : ''} ${dis} onchange="myAnswers[${q.id}]=this.value"> ${o}</label>`
      ).join('')}</div>`;
    case 'yes_no':
      return `<div class="radio-group">
        <label><input type="radio" name="q_${q.id}" value="Ja" ${answer === 'Ja' ? 'checked' : ''} ${dis} onchange="myAnswers[${q.id}]=this.value"> Ja</label>
        <label><input type="radio" name="q_${q.id}" value="Nej" ${answer === 'Nej' ? 'checked' : ''} ${dis} onchange="myAnswers[${q.id}]=this.value"> Nej</label>
      </div>`;
    case 'over_under':
      return `<div class="radio-group">
        <label><input type="radio" name="q_${q.id}" value="Over" ${answer === 'Over' ? 'checked' : ''} ${dis} onchange="myAnswers[${q.id}]=this.value"> Over</label>
        <label><input type="radio" name="q_${q.id}" value="Under" ${answer === 'Under' ? 'checked' : ''} ${dis} onchange="myAnswers[${q.id}]=this.value"> Under</label>
      </div>`;
    case 'exact_value':
      return `<input type="text" value="${answer || ''}" ${dis} placeholder="Skriv ditt svar..."
        style="max-width:300px" onchange="myAnswers[${q.id}]=this.value" onkeyup="myAnswers[${q.id}]=this.value">`;
    default: return '';
  }
}

async function saveAnswers() {
  const answers = Object.entries(myAnswers).map(([question_id, answer]) => ({ question_id: Number(question_id), answer }));
  try {
    await api('/api/answers', { method: 'POST', body: JSON.stringify({ answers }) });
    document.getElementById('saveMsg').innerHTML = '<div class="msg msg-success">Dina svar har sparats!</div>';
    setTimeout(() => document.getElementById('saveMsg').innerHTML = '', 3000);
  } catch (e) {
    document.getElementById('saveMsg').innerHTML = `<div class="msg msg-error">${e.message}</div>`;
  }
}

// ── Results ──
async function loadResults() {
  const data = await api('/api/results');
  document.getElementById('resultStats').innerHTML = `
    <div class="stat-card"><div class="stat-value">${data.earnedPoints}</div><div class="stat-label">Dina poäng</div></div>
    <div class="stat-card"><div class="stat-value">${data.totalPoints}</div><div class="stat-label">Max poäng</div></div>
    <div class="stat-card"><div class="stat-value">${data.results.filter(r => r.correct === true).length}/${data.results.filter(r => r.correct_answer !== null).length}</div><div class="stat-label">Rätt svar</div></div>
  `;

  let html = '';
  data.results.forEach(r => {
    const cls = r.correct === true ? 'result-correct' : r.correct === false ? 'result-wrong' : 'result-pending';
    const badge = r.correct === true ? '<span class="result-badge badge-correct">Rätt</span>'
      : r.correct === false ? '<span class="result-badge badge-wrong">Fel</span>'
      : '<span class="result-badge badge-pending">Väntar</span>';
    html += `<div class="question-card ${cls}">
      <div class="q-header"><span class="q-text">${r.text}</span><span class="q-points">${r.points} p</span></div>
      <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center;margin-top:0.5rem">
        <div><strong>Ditt svar:</strong> ${r.my_answer || '<em style="color:var(--gray)">Ej besvarat</em>'}</div>
        ${r.correct_answer !== null ? `<div><strong>Rätt svar:</strong> ${r.correct_answer}</div>` : ''}
        ${badge}
      </div>
    </div>`;
  });

  document.getElementById('resultsList').innerHTML = html || '<p style="color:var(--text-muted)">Inga resultat ännu.</p>';
}

// ── Leaderboard ──
async function loadLeaderboard() {
  const board = await api('/api/leaderboard');
  const tbody = document.querySelector('#leaderboardTable tbody');
  tbody.innerHTML = board.map((p, i) => {
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    return `<tr>
      <td class="${rankClass}">${i + 1}</td>
      <td class="${rankClass}">${p.name}</td>
      <td><strong>${p.points}</strong></td>
      <td>${p.correctCount} st</td>
    </tr>`;
  }).join('');
}

// ── Admin ──
function showAdminTab(tab) {
  document.querySelectorAll('#adminTabs .tab').forEach(t => t.classList.remove('active'));
  ['adminQuestions','adminSettings','adminUsers'].forEach(id => document.getElementById(id).classList.add('hidden'));
  event.target.classList.add('active');
  document.getElementById('admin' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.remove('hidden');
  if (tab === 'settings') loadAdminSettings();
}

function toggleOptionsField() {
  const type = document.getElementById('aqType').value;
  document.getElementById('optionsGroup').classList.toggle('hidden', type === 'yes_no' || type === 'exact_value');
}

async function addQuestion() {
  const text = document.getElementById('aqText').value;
  const type = document.getElementById('aqType').value;
  const points = parseInt(document.getElementById('aqPoints').value) || 1;
  const category = document.getElementById('aqCategory').value;
  const sort_order = parseInt(document.getElementById('aqOrder').value) || 0;
  const optionsRaw = document.getElementById('aqOptions').value;
  const options = (type === 'multiple_choice' || type === 'over_under')
    ? optionsRaw.split('\n').map(s => s.trim()).filter(Boolean) : null;

  try {
    await api('/api/admin/questions', { method: 'POST', body: JSON.stringify({ text, type, options, points, category, sort_order }) });
    document.getElementById('aqText').value = '';
    document.getElementById('aqOptions').value = '';
    document.getElementById('aqMsg').innerHTML = '<div class="msg msg-success">Fråga tillagd!</div>';
    loadAdminQuestions();
    setTimeout(() => document.getElementById('aqMsg').innerHTML = '', 2000);
  } catch (e) {
    document.getElementById('aqMsg').innerHTML = `<div class="msg msg-error">${e.message}</div>`;
  }
}

async function loadAdminQuestions() {
  const questions = await api('/api/admin/questions');
  const container = document.getElementById('adminQuestionsList');
  if (!questions.length) { container.innerHTML = '<p style="color:var(--text-muted)">Inga frågor ännu.</p>'; return; }

  container.innerHTML = questions.map(q => `
    <div class="question-card" style="font-size:0.9rem">
      <div class="q-header">
        <span class="q-text">${q.text}</span>
        <span class="q-points">${q.points} p</span>
      </div>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;margin-bottom:0.5rem">
        <span style="font-size:0.75rem;background:rgba(66,153,225,0.15);color:#63b3ed;padding:0.15rem 0.5rem;border-radius:4px">${q.type}</span>
        ${q.category ? `<span style="font-size:0.75rem;background:rgba(183,148,244,0.15);color:#b794f4;padding:0.15rem 0.5rem;border-radius:4px">${q.category}</span>` : ''}
        ${q.correct_answer ? `<span style="font-size:0.75rem;background:rgba(104,211,145,0.15);color:var(--correct);padding:0.15rem 0.5rem;border-radius:4px">Svar: ${q.correct_answer}</span>` : '<span style="font-size:0.75rem;background:rgba(236,201,75,0.15);color:var(--gold);padding:0.15rem 0.5rem;border-radius:4px">Inget svar satt</span>'}
      </div>
      <div class="inline-flex">
        <button class="btn btn-sm" onclick="setCorrectAnswer(${q.id}, '${q.type}', ${q.options ? JSON.stringify(JSON.stringify(q.options)) : 'null'})">Sätt rätt svar</button>
        <button class="btn btn-sm btn-danger" onclick="deleteQuestion(${q.id})">Ta bort</button>
      </div>
    </div>
  `).join('');
}

async function setCorrectAnswer(id, type, optionsJson) {
  let answer;
  if (type === 'yes_no') {
    answer = prompt('Rätt svar (Ja/Nej):');
  } else if (type === 'over_under') {
    answer = prompt('Rätt svar (Over/Under):');
  } else if (type === 'multiple_choice' && optionsJson) {
    const opts = JSON.parse(optionsJson);
    answer = prompt('Rätt svar (välj ett):\n' + opts.map((o,i) => `${i+1}. ${o}`).join('\n'));
    const idx = parseInt(answer) - 1;
    if (idx >= 0 && idx < opts.length) answer = opts[idx];
  } else {
    answer = prompt('Rätt svar:');
  }
  if (answer === null) return;

  const q = (await api('/api/admin/questions')).find(q => q.id === id);
  await api(`/api/admin/questions/${id}`, {
    method: 'PUT',
    body: JSON.stringify({ ...q, correct_answer: answer, options: q.options || undefined })
  });
  loadAdminQuestions();
}

async function deleteQuestion(id) {
  if (!confirm('Är du säker? Alla svar på denna fråga raderas.')) return;
  await api(`/api/admin/questions/${id}`, { method: 'DELETE' });
  loadAdminQuestions();
}

async function loadAdminSettings() {
  document.getElementById('settingName').value = settings.pool_name || '';
  document.getElementById('settingDeadline').value = settings.deadline || '';
  document.getElementById('settingLocked').checked = settings.locked === '1';
}

async function saveSettings() {
  try {
    await api('/api/admin/settings', {
      method: 'PUT',
      body: JSON.stringify({
        pool_name: document.getElementById('settingName').value,
        deadline: document.getElementById('settingDeadline').value,
        locked: document.getElementById('settingLocked').checked
      })
    });
    await loadSettings();
    document.getElementById('settingsMsg').innerHTML = '<div class="msg msg-success">Inställningar sparade!</div>';
    setTimeout(() => document.getElementById('settingsMsg').innerHTML = '', 2000);
  } catch (e) {
    document.getElementById('settingsMsg').innerHTML = `<div class="msg msg-error">${e.message}</div>`;
  }
}

async function loadAdminUsers() {
  const users = await api('/api/admin/users');
  document.querySelector('#usersTable tbody').innerHTML = users.map(u => `
    <tr>
      <td>${u.name}</td>
      <td style="color:var(--gray)">${u.email}</td>
      <td>${u.is_admin ? '<span style="color:var(--green)">Admin</span>' : ''}</td>
      <td style="color:var(--gray)">${new Date(u.created_at).toLocaleDateString('sv-SE')}</td>
      <td class="actions">
        <button class="btn btn-sm btn-secondary" onclick="toggleAdmin(${u.id})">${u.is_admin ? 'Ta bort admin' : 'Gör admin'}</button>
        <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})">Ta bort</button>
      </td>
    </tr>
  `).join('');
}

async function toggleAdmin(id) {
  await api(`/api/admin/users/${id}/toggle-admin`, { method: 'PUT' });
  loadAdminUsers();
}

async function deleteUser(id) {
  if (!confirm('Är du säker? Alla svar från denna användare raderas.')) return;
  await api(`/api/admin/users/${id}`, { method: 'DELETE' });
  loadAdminUsers();
}

// ── Init ──
checkAuth();
</script>
</body>
</html>
